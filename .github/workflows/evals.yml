name: LLM Agent Evals

# Temporarily disabled — re-enable push/PR when CI is fixed.
on:
  workflow_dispatch:

jobs:
  run-evals:
    runs-on: ubuntu-latest
    concurrency:
      group: evals-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Run Pydantic Evals Matrix
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: uv run --frozen --no-dev python -m agent_eval_matrix.matrix run --matrix experiments/matrices/full.yaml

      - name: Upload Eval Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: eval-report-${{ github.sha }}
          path: reports/*.json
          retention-days: 90
